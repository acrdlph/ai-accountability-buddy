<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#6b7280"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#22c55e"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="white" rx="8"/>

  <!-- Stage labels -->
  <text x="400" y="32" text-anchor="middle" font-size="11" font-weight="600" fill="#9ca3af" letter-spacing="1.5">ARCHITECTURE</text>

  <!-- ==================== STAGE 1: PRE-CALL ==================== -->

  <!-- Stage 1 background -->
  <rect x="30" y="50" width="355" height="340" rx="12" fill="#f0f9ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="50" y="76" font-size="12" font-weight="700" fill="#3b82f6">STAGE 1</text>
  <text x="104" y="76" font-size="12" font-weight="500" fill="#60a5fa">Pre-call Briefing</text>

  <!-- Habitify box -->
  <rect x="60" y="105" width="160" height="64" rx="10" fill="white" stroke="#e5e7eb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="140" y="133" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">Habitify</text>
  <text x="140" y="152" text-anchor="middle" font-size="11" fill="#64748b">Habit data &amp; status</text>

  <!-- Briefing Agent box -->
  <rect x="60" y="220" width="160" height="64" rx="10" fill="white" stroke="#e5e7eb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="140" y="248" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">Briefing Agent</text>
  <text x="140" y="267" text-anchor="middle" font-size="11" fill="#64748b">gpt-5-mini</text>

  <!-- OpenAI Responses API box -->
  <rect x="255" y="220" width="115" height="64" rx="10" fill="white" stroke="#e5e7eb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="312" y="248" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">OpenAI</text>
  <text x="312" y="267" text-anchor="middle" font-size="11" fill="#64748b">Responses API</text>

  <!-- Briefing output -->
  <rect x="95" y="328" width="190" height="44" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="190" y="355" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">Briefing + Habit IDs</text>

  <!-- Stage 1 arrows -->
  <!-- Habitify -> Briefing Agent -->
  <line x1="140" y1="169" x2="140" y2="218" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)" marker-start="url(#arrow-blue)"/>
  <text x="152" y="198" font-size="10" font-weight="600" fill="#3b82f6">MCP</text>

  <!-- Briefing Agent -> OpenAI -->
  <line x1="222" y1="252" x2="253" y2="252" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Briefing Agent -> Briefing output -->
  <line x1="140" y1="284" x2="140" y2="326" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- ==================== STAGE 2: VOICE CALL ==================== -->

  <!-- Stage 2 background -->
  <rect x="415" y="50" width="355" height="340" rx="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="435" y="76" font-size="12" font-weight="700" fill="#22c55e">STAGE 2</text>
  <text x="489" y="76" font-size="12" font-weight="500" fill="#4ade80">Voice Call</text>

  <!-- Voice Agent (LiveKit) box -->
  <rect x="475" y="105" width="160" height="64" rx="10" fill="white" stroke="#e5e7eb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="555" y="133" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">Voice Agent</text>
  <text x="555" y="152" text-anchor="middle" font-size="11" fill="#64748b">LiveKit + Realtime API</text>

  <!-- Twilio box -->
  <rect x="475" y="220" width="160" height="64" rx="10" fill="white" stroke="#e5e7eb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="555" y="248" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">Twilio</text>
  <text x="555" y="267" text-anchor="middle" font-size="11" fill="#64748b">Elastic SIP Trunk</text>

  <!-- Phone / User box -->
  <rect x="490" y="328" width="130" height="44" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="518" y="350" text-anchor="middle" font-size="16">&#128222;</text>
  <text x="570" y="355" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">Your Phone</text>

  <!-- Habitify (write-back) small label on right side -->
  <rect x="668" y="105" width="88" height="64" rx="10" fill="white" stroke="#e5e7eb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="712" y="130" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">Habitify</text>
  <text x="712" y="148" text-anchor="middle" font-size="10" fill="#64748b">Log habits</text>
  <text x="712" y="160" text-anchor="middle" font-size="10" fill="#64748b">via MCP</text>

  <!-- Stage 2 arrows -->
  <!-- Voice Agent -> Twilio -->
  <line x1="555" y1="169" x2="555" y2="218" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="567" y="198" font-size="10" font-weight="600" fill="#22c55e">SIP</text>

  <!-- Twilio -> Phone -->
  <line x1="555" y1="284" x2="555" y2="326" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="567" y="309" font-size="10" font-weight="600" fill="#22c55e">PSTN</text>

  <!-- Voice Agent -> Habitify write-back -->
  <line x1="637" y1="137" x2="666" y2="137" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- ==================== CONNECTING ARROW ==================== -->

  <!-- Briefing -> Voice Agent (stage connector) -->
  <path d="M 287 350 Q 400 350 400 200 Q 400 137 473 137" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="6 3" fill="none" marker-end="url(#arrow)"/>
  <text x="400" y="420" text-anchor="middle" font-size="10" fill="#6b7280" font-style="italic">briefing feeds into voice call</text>

  <!-- ==================== BOTTOM FLOW SUMMARY ==================== -->
  <text x="400" y="475" text-anchor="middle" font-size="11" fill="#9ca3af">
    <tspan font-weight="600" fill="#3b82f6">Stage 1:</tspan>
    <tspan fill="#6b7280"> Fetch habits &amp; build briefing</tspan>
    <tspan dx="24" font-weight="600" fill="#22c55e">Stage 2:</tspan>
    <tspan fill="#6b7280"> Call, discuss, log completions</tspan>
  </text>

  <!-- File mapping -->
  <text x="400" y="500" text-anchor="middle" font-size="10" fill="#b0b8c4">
    <tspan font-weight="600" fill="#3b82f6">habitify_briefing.py</tspan>
    <tspan fill="#d1d5db"> | </tspan>
    <tspan font-weight="600" fill="#22c55e">agent.py</tspan>
  </text>
</svg>
